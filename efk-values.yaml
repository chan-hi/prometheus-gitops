# EFK Stack Values
# Fluent Bit, Elasticsearch, Kibana 설정

## ================================
## Fluent Bit 설정
## ================================
fluent-bit:
  enabled: true
  image:
    repository: fluent/fluent-bit
    tag: 2.1.10
  
  # 리소스 제한 설정
  resources:
    limits:
      memory: 256Mi
      cpu: 100m
    requests:
      memory: 128Mi
      cpu: 50m
  
  # 로그 수집 설정
  config:
    service: |
      [SERVICE]
          Daemon Off
          Flush 1
          Log_Level info
          Parsers_File parsers.conf
          HTTP_Server On
          HTTP_Listen 0.0.0.0
          HTTP_Port 2020
          Health_Check On
    
    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*.log
          multiline.parser docker, cri
          Tag kube.*
          Mem_Buf_Limit 50MB
          Skip_Long_Lines On
          
      [INPUT]
          Name systemd
          Tag host.*
          Systemd_Filter _SYSTEMD_UNIT=kubelet.service
          Systemd_Filter _SYSTEMD_UNIT=docker.service
    
    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Kube_URL https://kubernetes.default.svc:443
          Kube_CA_File /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File /var/run/secrets/kubernetes.io/serviceaccount/token
          Kube_Tag_Prefix kube.var.log.containers.
          Merge_Log On
          Keep_Log Off
          K8S-Logging.Parser On
          K8S-Logging.Exclude On
          
      [FILTER]
          Name modify
          Match kube.*
          Remove kubernetes.pod_id
          Remove kubernetes.docker_id
          Remove kubernetes.container_hash
    
    outputs: |
      [OUTPUT]
          Name es
          Match kube.*
          Host elasticsearch-master.logging.svc.cluster.local
          Port 9200
          Logstash_Format On
          Logstash_Prefix kubernetes
          Retry_Limit 5
          
      [OUTPUT]
          Name es
          Match host.*
          Host elasticsearch-master.logging.svc.cluster.local
          Port 9200
          Logstash_Format On
          Logstash_Prefix systemd
          Retry_Limit 5

## ================================
## Elasticsearch 설정
## ================================
elasticsearch:
  enabled: true
  replicas: 2
  minimumMasterNodes: 1
  
  # 리소스 설정
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  
  # 스토리지 설정
  volumeClaimTemplate:
    accessModes: ["ReadWriteOnce"]
    storageClassName: standard
    resources:
      requests:
        storage: 10Gi
  
  # ES 설정
  esConfig:
    elasticsearch.yml: |
      cluster.name: "elasticsearch"
      network.host: 0.0.0.0
      discovery.seed_hosts: "elasticsearch-master-headless"
      cluster.initial_master_nodes: "elasticsearch-master-0,elasticsearch-master-1"
      xpack.security.enabled: false
      xpack.monitoring.collection.enabled: false

## ================================
## Kibana 설정
## ================================
kibana:
  enabled: true
  replicas: 1
  
  # 리소스 설정
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  
  # 서비스 설정
  service:
    type: NodePort
    nodePort: 30008
  
  # Kibana 설정
  kibanaConfig:
    kibana.yml: |
      server.name: kibana
      server.host: "0"
      elasticsearch.hosts: [ "http://elasticsearch-master.logging.svc.cluster.local:9200" ]
      monitoring.ui.container.elasticsearch.enabled: true
      xpack.security.enabled: false
      xpack.monitoring.enabled: false